<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: .5rem; color: #555; }
        input[type="url"], input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #004494; }
        .result { margin-top: 1.5rem; padding: 1rem; background-color: #e9ecef; border-radius: 4px; display: none; text-align: center; }
        .result a { color: #0056b3; font-weight: bold; font-size: 1.2rem; text-decoration: none; word-break: break-all; }
        .error { color: #dc3545; font-weight: bold; text-align: center; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Shorten Your Link</h2>
    
    <form id="shortenForm" onsubmit="event.preventDefault(); shortenUrl();">
        <div class="form-group">
            <label for="longUrl">Destination URL *</label>
            <input type="url" id="longUrl" placeholder="https://example.com/very-long-link" required>
        </div>

        <div class="form-group">
            <label for="customCode">Custom Alias (Optional)</label>
            <input type="text" id="customCode" placeholder="e.g. my-link" 
                   maxlength="10" 
                   pattern="^[a-zA-Z0-9-_]+$" 
                   title="Only letters, numbers, hyphens, and underscores are allowed (Max 10 characters).">
            <small style="color: #666; font-size: 12px; display: block; margin-top: 4px;">Max 10 chars. Letters, numbers, hyphens, underscores only.</small>
        </div>
		
        <button type="submit">Shorten</button>
    </form>

    <div class="error" id="errorMsg"></div>

    <div class="result" id="resultDiv">
        <p>Your shortened URL:</p>
        <a href="#" id="shortUrlLink" target="_blank"></a>
    </div>
</div>

<script>
    async function shortenUrl() {
        const longUrl = document.getElementById('longUrl').value;
        const customCode = document.getElementById('customCode').value;
        const errorMsg = document.getElementById('errorMsg');
        const resultDiv = document.getElementById('resultDiv');
        const shortUrlLink = document.getElementById('shortUrlLink');

        errorMsg.style.display = 'none';
        resultDiv.style.display = 'none';

        if (!longUrl) {
            errorMsg.innerText = "Please enter a valid URL.";
            errorMsg.style.display = 'block';
            return;
        }

        const payload = { longUrl: longUrl };
        if (customCode.trim() !== "") {
            payload.customCode = customCode;
        }

        try {
            const response = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                shortUrlLink.href = data.shortUrl;
                shortUrlLink.innerText = data.shortUrl;
                resultDiv.style.display = 'block';
            } else {
                errorMsg.innerText = data.message || "Failed to shorten URL. Custom code might be taken.";
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorMsg.innerText = "Network error. Is the backend running?";
            errorMsg.style.display = 'block';
        }
    }
</script>

</body>
</html>
